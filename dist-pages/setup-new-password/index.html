<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/TMA-PORTAL/">
  <script>window.__TMA_SITE_ROOT="/TMA-PORTAL";</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup New Password — TM ANTOINE Advisory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/TMA-PORTAL/css/tokens.css">
  <link rel="stylesheet" href="/TMA-PORTAL/css/theme.css">
  <link rel="stylesheet" href="/TMA-PORTAL/css/auth.css">
  <style>
    html, body { margin: 0; min-height: 100%; }
  </style>
</head>
<body>
  <main class="tma-auth" data-node-id="32546:96138">
    <div class="tma-auth__body">
      <section class="tma-auth__card" data-node-id="I32546:96138;387056:47987" aria-labelledby="setup-password-title">
        <div class="tma-auth__intro" data-node-id="I32546:96138;387056:47988">
          <h1 class="tma-auth__title" id="setup-password-title">Setup New Password</h1>
          <p class="tma-auth__subtitle">Have you already reset the password ? <a href="/TMA-PORTAL/sign-in">Sign in</a></p>
        </div>

        <form class="tma-auth__card-form" id="setup-password-form" action="#" method="post" novalidate>
          <div class="tma-auth__fields" data-node-id="I32546:96138;387056:47989">
            <label class="tma-auth__field tma-auth__field--password">
              <input class="tma-auth__input" type="password" name="password" placeholder="Password" autocomplete="new-password" aria-label="Password">
              <button type="button" class="tma-auth__toggle-pwd" aria-label="Toggle password visibility">
                <img src="/TMA-PORTAL/images/icons/phosphor/EyeSlash.svg" alt="" width="16" height="16" aria-hidden="true">
              </button>
            </label>
            <div class="tma-auth__strength" aria-hidden="true">
              <span class="tma-auth__strength-seg"></span>
              <span class="tma-auth__strength-seg"></span>
              <span class="tma-auth__strength-seg"></span>
              <span class="tma-auth__strength-seg"></span>
            </div>
            <p class="tma-auth__hint">Use 8 or more characters with a mix of letters, numbers &amp; symbols.</p>
            <label class="tma-auth__field">
              <input class="tma-auth__input" type="password" name="password_confirm" placeholder="Repeat Password" autocomplete="new-password" aria-label="Repeat Password">
            </label>
            <label class="tma-auth__terms">
              <input type="checkbox" name="terms" value="1">
              <span>I Accept the <a href="#">Terms</a></span>
            </label>
          </div>

          <button type="submit" class="tma-auth__submit" data-node-id="I32546:96138;387056:47990">Submit</button>
        </form>
      </section>
    </div>

    <p class="tma-auth__copyright" data-node-id="I32546:96138;387056:47985">&copy; 2026 TM ANTOINE Advisory</p>
  </main>
</body>
</html>
