<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM ANTOINE Advisory - Chart Graphics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/charts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f5f5f7; color: #000; padding: 48px; }
    .section { margin-bottom: 80px; }
    .section-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 24px; }
    .frame { display: flex; gap: 64px; align-items: flex-start; background: #fff; border-radius: 48px; padding: 64px; max-width: 100%; }
    .nav-card { flex: 0 0 320px; background: #000; border-radius: 48px; padding: 48px 36px; }
    .nav-card h1 {
      font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 16px;
      background: linear-gradient(100deg, #fff 1%, #dcd4ff 46%, #e2cbff 56%, #98baff 67%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-card p { font-size: 16px; line-height: 1.5; color: #fff; opacity: 0.9; }
    .content { flex: 1; min-width: 0; }
    .setup {
      background: #1e1e1e; color: #d4d4d4; padding: 16px 20px; border-radius: 12px;
      font-size: 13px; line-height: 1.6; margin-bottom: 32px; overflow-x: auto;
    }
    .category-label {
      font-size: 13px; font-weight: 600; color: #666; margin: 40px 0 20px;
      text-transform: none; letter-spacing: 0;
    }
    .category-label:first-child { margin-top: 0; }
    .motion-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
    .vertical-grid { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
    .vertical-wide-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin-top: 20px; }
    .horizontal-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
    .circular-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
    .chart-item { display: flex; flex-direction: column; gap: 8px; }
    .chart-item figcaption { font-size: 11px; color: #888; }
    .chart-item img { display: block; }

    @media (max-width: 900px) {
      body { padding: 24px 16px; }
      .frame { flex-direction: column; gap: 24px; padding: 28px 20px; border-radius: 28px; }
      .nav-card { width: 100%; flex: none; padding: 32px 24px; border-radius: 28px; }
      .nav-card h1 { font-size: 36px; }
    }
  </style>
</head>
<body>

  <div class="section">
    <p class="section-title">Chart graphics - Figma SVG exports</p>
    <div class="frame">
      <div class="nav-card">
        <h1>Charts</h1>
        <p>26 pre-designed chart graphics from Portal-Design, exported as pixel-faithful SVG assets.</p>
      </div>
      <div class="content">
        <pre class="setup">&lt;!-- One-time setup --&gt;
@include('partials.charts')

&lt;!-- By slug --&gt;
&lt;x-chart name="vertical-01" /&gt;

&lt;!-- By file --&gt;
&lt;x-chart file="ChartMotion-02.svg" /&gt;</pre>

        <div id="charts"></div>
      </div>
    </div>
  </div>

<script>
const BASE = '../images/charts/';
const categoryLabels = {
  motion: 'Chart ↗',
  vertical: 'Vertical bar',
  horizontal: 'Horizontal bar',
  circular: 'CircularChart',
  proportion: 'Proportion',
};

const layout = {
  motion: 'motion-row',
  vertical: 'vertical-grid',
  horizontal: 'horizontal-row',
  circular: 'circular-row',
};

fetch('charts-catalog.json')
  .then(r => r.json())
  .then(({ categories, items }) => {
    const root = document.getElementById('charts');
    let currentCategory = null;
    let container = null;
    let wideContainer = null;

    items.forEach(item => {
      if (item.category !== currentCategory) {
        currentCategory = item.category;
        const label = document.createElement('p');
        label.className = 'category-label';
        label.textContent = categoryLabels[currentCategory] || currentCategory;
        root.appendChild(label);

        container = document.createElement('div');
        container.className = layout[currentCategory] || 'vertical-grid';
        root.appendChild(container);

        if (currentCategory === 'vertical') {
          wideContainer = document.createElement('div');
          wideContainer.className = 'vertical-wide-row';
          root.appendChild(wideContainer);
        }
      }

      const figure = document.createElement('figure');
      figure.className = 'chart-item';

      const img = document.createElement('img');
      img.src = BASE + item.file;
      img.alt = item.name;
      img.width = item.width;
      img.height = item.height;
      img.loading = 'lazy';
      if (item.wide) img.className = 'tma-chart-graphic--wide';
      if (item.category === 'motion') img.className = 'tma-chart-graphic--motion';

      const cap = document.createElement('figcaption');
      cap.textContent = `${item.name} · ${item.size}`;

      figure.appendChild(img);
      figure.appendChild(cap);

      const isWideVertical = item.category === 'vertical' && (item.wide || item.slug === 'vertical-10' || item.slug === 'proportion-statistics');
      if (isWideVertical && wideContainer) {
        wideContainer.appendChild(figure);
      } else {
        container.appendChild(figure);
      }
    });
  });
</script>
</body>
</html>
