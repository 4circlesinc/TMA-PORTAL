<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>TM ANTOINE Advisory — Components</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/components-page.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.tma-components-page {
      font-family: Inter, system-ui, sans-serif;
      background: #f5f5f7;
      color: #000;
      font-feature-settings: "ss01" 1, "cv01" 1;

<body class="tma-components-page">

    <header class="tma-components-demo__header">
      <h1 class="tma-components-demo__title">Components</h1>
      <p class="tma-components-demo__copy">

      </p>

    <div class="tma-components-demo__canvas" id="components-root">
      <div class="tma-components-responsive">
        <p style="padding:24px;background:#fff;border-radius:24px;color:rgba(0,0,0,0.6)">Loading components board…</p>
      </div>

<script src="../js/components-page.js"></script>
<script>
window.TMAComponentsPage.mountComponentsPage(document.getElementById('components-root'));
</script>
