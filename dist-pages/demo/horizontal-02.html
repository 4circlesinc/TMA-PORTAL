<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM ANTOINE Advisory — Horizontal 02</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/charts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f5f5f7; color: #000; padding: 48px; }
    .frame { display: flex; gap: 64px; align-items: flex-start; background: #fff; border-radius: 48px; padding: 64px; max-width: 900px; }
    .nav-card { flex: 0 0 280px; background: #000; border-radius: 48px; padding: 40px 32px; }
    .nav-card h1 { font-size: 44px; font-weight: 700; line-height: 1; margin-bottom: 16px; background: linear-gradient(100deg, #fff 1%, #dcd4ff 46%, #e2cbff 56%, #98baff 67%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-card p { font-size: 15px; line-height: 1.5; color: #fff; opacity: 0.9; }
    .content { flex: 1; min-width: 0; }
    .section-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 24px; }
    .setup { background: #1e1e1e; color: #d4d4d4; padding: 16px 20px; border-radius: 12px; font-size: 13px; line-height: 1.6; margin-bottom: 28px; overflow-x: auto; }
    .chart-wrap { border: 1px solid #eee; border-radius: 16px; padding: 32px 24px 24px; background: #fafafa; overflow: visible; max-width: 240px; }
    .hint { margin-top: 12px; font-size: 12px; color: #888; }
    @media (max-width: 900px) { body { padding: 24px 16px; } .frame { flex-direction: column; padding: 28px 20px; border-radius: 28px; } .nav-card { width: 100%; flex: none; } }
  </style>
</head>
<body>
  <p class="section-title">Horizontal bar — Horizontal 02</p>
  <div class="frame">
    <div class="nav-card">
      <h1>Horizontal 02</h1>
      <p>Layered horizontal bars — 20% opacity track plus solid foreground pill. Counterpart to Vertical 02.</p>
    </div>
    <div class="content">
      <pre class="setup">&lt;x-chart-horizontal-02 /&gt;

&lt;x-chart-horizontal-02 :track-opacity="0.2" :x-max="6000" /&gt;</pre>
      <div class="chart-wrap">
        <div class="tma-chart-scroll">
          <div id="chart" class="tma-chart-horizontal-02" role="group" aria-label="Layered horizontal bar chart"></div>
        </div>
        <p class="hint">Hover a bar for the foreground value tooltip.</p>
      </div>
    </div>
  </div>
<script>
const CHART_HEIGHT = 240;
const BAR_HEIGHT = 28;
const TRACK_OPACITY = 0.2;
const COLORS = {
  cyan: '#a0bce8',
  mint: '#6be6d3',
  black: '#000000',
  blue: '#7dbbff',
  purple: '#b899eb',
  green: '#71dd8c',
};

function formatValue(v) { return v.toLocaleString(); }
function barSizePercent(value, max) { return Math.max(2, Math.min(100, (value / max) * 100)); }

function normalizeBars(preset) {
  const max = preset.xMax || 6000;
  return (preset.bars || []).map((bar, index) => {
    const value = bar.value;
    const size = bar.size != null ? bar.size : barSizePercent(value, max);
    const trackSize = bar.trackSize != null ? bar.trackSize : Math.min(100, Math.max(size, size * 1.34));
    const top = bar.top != null ? bar.top : index * 40 + 6;
    return {
      value,
      size,
      trackSize: Math.max(size, Math.min(100, trackSize)),
      color: COLORS[bar.color] || bar.color || '#000000',
      topPct: (top / CHART_HEIGHT) * 100,
      heightPct: (BAR_HEIGHT / CHART_HEIGHT) * 100,
    };
  });
}

function renderChart(root, preset) {
  root.style.setProperty('--h02-bar-height', `${BAR_HEIGHT}px`);
  root.style.setProperty('--h02-track-opacity', preset.trackOpacity ?? TRACK_OPACITY);

  const barsEl = document.createElement('div');
  barsEl.className = 'tma-chart-horizontal-02__bars';

  normalizeBars(preset).forEach((bar, index) => {
    const el = document.createElement('div');
    el.className = 'tma-chart-horizontal-02__bar';
    el.style.top = `${bar.topPct}%`;
    el.style.height = `${bar.heightPct}%`;
    el.tabIndex = 0;
    el.setAttribute('role', 'button');
    el.setAttribute('aria-label', `Bar ${index + 1}: ${formatValue(bar.value)}`);

    const tooltip = document.createElement('span');
    tooltip.className = 'tma-chart-horizontal-02__tooltip';
    tooltip.setAttribute('aria-hidden', 'true');
    tooltip.textContent = formatValue(bar.value);

    const track = document.createElement('div');
    track.className = 'tma-chart-horizontal-02__track';
    track.setAttribute('aria-hidden', 'true');
    track.style.width = `${bar.trackSize}%`;
    track.style.backgroundColor = bar.color;

    const pill = document.createElement('div');
    pill.className = 'tma-chart-horizontal-02__pill';
    pill.style.width = `${bar.size}%`;
    pill.style.backgroundColor = bar.color;

    el.appendChild(tooltip);
    el.appendChild(track);
    el.appendChild(pill);
    barsEl.appendChild(el);
  });

  root.appendChild(barsEl);
}

fetch('./data/horizontal-02.json')
  .then(r => r.json())
  .then(preset => {
    const chart = document.getElementById('chart');
    renderChart(chart, preset);
    window.PortalChartMotion.initChart(chart);
  });
</script>
<script src="../js/chart-motion.js"></script>
</body>
</html>
