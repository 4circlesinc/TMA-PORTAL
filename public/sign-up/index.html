<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — TM ANTOINE Advisory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/auth.css">
  <style>
    html, body { margin: 0; min-height: 100%; }
  </style>
</head>
<body>
  <main class="tma-auth" data-node-id="32546:96141">
    <div class="tma-auth__body">
      <section class="tma-auth__card" data-node-id="I32546:96141;387056:47987" aria-labelledby="sign-up-title">
        <div class="tma-auth__intro">
          <h1 class="tma-auth__title" id="sign-up-title">Sign Up</h1>
          <p class="tma-auth__subtitle">Your Social Campaigns</p>
        </div>

        <div class="tma-auth__social">
          <button type="button" class="tma-auth__social-btn">
            <img src="/images/icons/brands/Apple16.svg" alt="" width="16" height="16" aria-hidden="true">
            <span>Sign in with Apple</span>
          </button>
          <button type="button" class="tma-auth__social-btn">
            <img src="/images/icons/brands/Google16.svg" alt="" width="16" height="16" aria-hidden="true">
            <span>Sign in with Google</span>
          </button>
        </div>

        <div class="tma-auth__divider" aria-hidden="true">Or with Email</div>

        <div class="tma-auth__fields">
          <label class="tma-auth__field">
            <input class="tma-auth__input" type="email" name="email" placeholder="Email" autocomplete="email" aria-label="Email">
          </label>
          <label class="tma-auth__field tma-auth__field--password">
            <input class="tma-auth__input" type="password" name="password" placeholder="Password" autocomplete="new-password" aria-label="Password">
            <button type="button" class="tma-auth__toggle-pwd" aria-label="Toggle password visibility">
              <img src="/images/icons/phosphor/EyeSlash.svg" alt="" width="16" height="16" aria-hidden="true">
            </button>
          </label>
          <div class="tma-auth__strength" aria-hidden="true">
            <span class="tma-auth__strength-seg"></span>
            <span class="tma-auth__strength-seg"></span>
            <span class="tma-auth__strength-seg"></span>
            <span class="tma-auth__strength-seg"></span>
          </div>
          <p class="tma-auth__hint">Use 8 or more characters with a mix of letters, numbers &amp; symbols.</p>
          <label class="tma-auth__field">
            <input class="tma-auth__input" type="password" name="password_confirm" placeholder="Repeat Password" autocomplete="new-password" aria-label="Repeat Password">
          </label>
          <label class="tma-auth__terms">
            <input type="checkbox" name="terms" value="1">
            <span>I Accept the <a href="#">Terms</a></span>
          </label>
        </div>

        <button type="submit" class="tma-auth__submit" form="sign-up-form">Sign Up</button>

        <p class="tma-auth__alt-link">Already have an Account? <a href="/sign-in">Sign in</a></p>

        <form id="sign-up-form" action="#" method="post" hidden novalidate></form>
      </section>
    </div>

    <p class="tma-auth__copyright">&copy; 2026 TM ANTOINE Advisory</p>
  </main>
</body>
</html>
