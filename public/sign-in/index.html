<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/" id="tma-site-base">
  <script>(function(){if(!location.hostname.endsWith("github.io"))return;var s=location.pathname.split("/").filter(Boolean)[0];if(!s)return;window.__TMA_SITE_ROOT="/"+s;var b=document.getElementById("tma-site-base");if(b)b.href="/"+s+"/";})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TM ANTOINE Advisory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/auth.css">
  <style>
    html, body { margin: 0; min-height: 100%; }
  </style>
</head>
<body>
  <main class="tma-auth" data-node-id="32546:96142">
    <div class="tma-auth__body">
      <section class="tma-auth__card" data-node-id="32546:96142;387056:48005" aria-labelledby="sign-in-title">
        <div class="tma-auth__intro">
          <h1 class="tma-auth__title" id="sign-in-title">Sign In</h1>
          <p class="tma-auth__subtitle">Your Social Campaigns</p>
        </div>

        <div class="tma-auth__social">
          <button type="button" class="tma-auth__social-btn">
            <img src="/images/icons/brands/Apple16.svg" alt="" width="16" height="16" aria-hidden="true">
            <span>Sign in with Apple</span>
          </button>
          <button type="button" class="tma-auth__social-btn">
            <img src="/images/icons/brands/Google16.svg" alt="" width="16" height="16" aria-hidden="true">
            <span>Sign in with Google</span>
          </button>
        </div>

        <div class="tma-auth__divider" aria-hidden="true">Or with Email</div>

        <form class="tma-auth__form" id="sign-in-form" action="#" method="post" novalidate>
          <label class="tma-auth__field">
            <input class="tma-auth__input" type="email" name="email" placeholder="Email" autocomplete="email" aria-label="Email">
          </label>
          <label class="tma-auth__field">
            <input class="tma-auth__input" type="password" name="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
          </label>
          <a class="tma-auth__forgot" href="/forgot-password/">Forgot Password?</a>
          <button type="submit" class="tma-auth__submit">Sign In</button>
        </form>

        <p class="tma-auth__alt-link">Not a Member yet? <a href="/sign-up">Sign Up</a></p>
      </section>
    </div>

    <p class="tma-auth__copyright">&copy; 2026 TM ANTOINE Advisory</p>
  </main>
</body>
</html>
