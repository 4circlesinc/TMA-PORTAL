<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM ANTOINE Advisory - Brand Logos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f5f5f7; color: #000; padding: 48px; }
    .back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #666; text-decoration: none; margin-bottom: 24px; }
    .back:hover { color: #000; }
    .section { margin-bottom: 80px; }
    .section-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 24px; }
    .frame { display: flex; gap: 64px; align-items: flex-start; background: #fff; border-radius: 48px; padding: 64px; max-width: 100%; }
    .nav-card { flex: 0 0 320px; background: #000; border-radius: 48px; padding: 48px 36px; }
    .nav-card h1 {
      font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 16px;
      background: linear-gradient(100deg, #fff 1%, #dcd4ff 46%, #e2cbff 56%, #98baff 67%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-card p { font-size: 16px; line-height: 1.5; color: #fff; opacity: 0.9; }
    .content { flex: 1; min-width: 0; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .search {
      flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #e0e0e5;
      border-radius: 10px; font: inherit; background: #fafafa;
    }
    .badge { font-size: 12px; color: #666; background: #f0f0f3; padding: 6px 10px; border-radius: 999px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .logo-card {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 20px 12px; border-radius: 12px; border: 1px solid #eee;
      background: #fafafa;
    }
    .logo-card:hover { background: #fff; border-color: #d8d8e0; }
    .logo-card img { width: 40px; height: 40px; display: block; object-fit: contain; }
    .logo-card span { font-size: 10px; color: #666; text-align: center; line-height: 1.2; word-break: break-word; }
    .usage { margin-top: 24px; font-size: 13px; color: #555; line-height: 1.6; }
    code { background: #f0f0f3; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

    @media (max-width: 900px) {
      body { padding: 24px 16px; }
      .frame { flex-direction: column; gap: 24px; padding: 28px 20px; border-radius: 28px; }
      .nav-card { width: 100%; flex: none; padding: 32px 24px; border-radius: 28px; }
      .nav-card h1 { font-size: 36px; }
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Portal menu</a>

  <div class="section">
    <p class="section-title">TM ANTOINE Advisory Brand Logos</p>
    <div class="frame">
      <div class="nav-card">
        <h1>Brand Logos</h1>
        <p>24×24 and 40×40 brand mark SVGs from Portal-Design. Use inside buttons, frames, and task rows.</p>
      </div>
      <div class="content">
        <div class="toolbar">
          <input class="search" id="logo-search" type="search" placeholder="Filter brand logos…" />
          <span class="badge" id="logo-count"></span>
        </div>
        <div class="grid" id="logo-grid"></div>
        <p class="usage">Usage: <code>asset('images/icons/brands/ChatGPT40.svg')</code></p>
      </div>
    </div>
  </div>

<script>
const BASE = '../images/icons/brands/';
const LOGOS = [
  { name: 'Behance', file: 'Behance40.svg', size: '40' },
  { name: 'ChatGPT', file: 'ChatGPT24.svg', size: '24' },
  { name: 'ChatGPT', file: 'ChatGPT40.svg', size: '40' },
  { name: 'Claude', file: 'Claude24.svg', size: '24' },
  { name: 'Copilot', file: 'Copilot40.svg', size: '40' },
  { name: 'DeepSeek', file: 'DeepSeek24.svg', size: '24' },
  { name: 'Dribbble', file: 'Dribbble40.svg', size: '40' },
  { name: 'Dropbox', file: 'Dropbox40.svg', size: '40' },
  { name: 'Excel', file: 'Excel40.svg', size: '40' },
  { name: 'Figma', file: 'Figma40.svg', size: '40' },
  { name: 'Github', file: 'Github40.svg', size: '40' },
  { name: 'Gumroad', file: 'Gumroad40.svg', size: '40' },
  { name: 'Lemon Squeezy', file: 'LemonSqueezy40.svg', size: '40' },
  { name: 'Loop', file: 'Loop40.svg', size: '40' },
  { name: 'Messenger', file: 'Messenger40.svg', size: '40' },
  { name: 'Ollama', file: 'Ollama24.svg', size: '24' },
  { name: 'PayPal', file: 'PayPal40.svg', size: '40' },
  { name: 'Perplexity', file: 'Perplexity24.svg', size: '24' },
  { name: 'Priority Medium', file: 'PriorityMedium40.svg', size: '40' },
  { name: 'Slack', file: 'Slack24.svg', size: '24' },
  { name: 'Slack', file: 'Slack40.svg', size: '40' },
  { name: 'Snow', file: 'TMALogoMark40.svg', size: '40' },
  { name: 'Word', file: 'Word40.svg', size: '40' },
  { name: 'X', file: 'XLogo24.svg', size: '24' },
  { name: 'YouTube', file: 'Youtube24.svg', size: '24' },
];

const grid = document.getElementById('logo-grid');
const count = document.getElementById('logo-count');
const search = document.getElementById('logo-search');

function render() {
  const q = search.value.trim().toLowerCase();
  const filtered = q
    ? LOGOS.filter(l => l.name.toLowerCase().includes(q) || l.file.toLowerCase().includes(q))
    : LOGOS;

  grid.innerHTML = filtered.map(logo => `
    <div class="logo-card" title="${logo.file}">
      <img src="${BASE}${logo.file}" alt="${logo.name}" width="40" height="40" loading="lazy">
      <span>${logo.name}<br>${logo.size}px</span>
    </div>
  `).join('');

  count.textContent = `${filtered.length} logos`;
}

search.addEventListener('input', render);
render();
</script>
</body>
</html>
