<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM ANTOINE Advisory - Toast guidance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/global-search.css">
  <link rel="stylesheet" href="../css/toast.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #fff;
      color: #000;
      padding: 80px;
      font-feature-settings: "ss01" 1, "cv01" 1;
    }
  </style>
</head>
<body>
  <nav class="tma-toast-guidance__navigation" aria-label="Component navigation">
    <h1 class="tma-toast-guidance__navigation-title">Toast Component</h1>
  </nav>

  <div class="tma-toast-guidance__layout">
    <aside class="tma-toast-guidance__variants" aria-label="Toast variants">
      <div class="tma-toast-guidance__variants-label"><span aria-hidden="true">❖</span><span>Toast</span></div>
      <div class="tma-toast-guidance__variants-panel" id="variants-panel"></div>
    </aside>

    <main class="tma-toast-guidance__content">
      <h2 class="tma-toast-guidance__title">Toast: Interactive guidance</h2>
      <p class="tma-toast-guidance__intro">Toast is required when a user writes data to the database.</p>

      <section class="tma-toast-guidance__section">
        <h3 class="tma-toast-guidance__section-title">Recedes from the bottom</h3>
        <div class="tma-toast-guidance__scene-frame">
          <div id="scene-enter"></div>
          <span class="tma-toast-guidance__callout-line tma-toast-guidance__callout-line--bottom" aria-hidden="true"></span>
          <span class="tma-toast-guidance__callout tma-toast-guidance__callout--bottom">Notifications appear at the bottom</span>
        </div>
        <div class="tma-toast-guidance__trigger-row">
          <button type="button" class="tma-toast-guidance__trigger" data-show-enter>Show toast</button>
        </div>
      </section>

      <section class="tma-toast-guidance__section">
        <h3 class="tma-toast-guidance__section-title">stay 3s</h3>
        <div class="tma-toast-guidance__scene-frame">
          <div id="scene-duration"></div>
          <span class="tma-toast-guidance__callout-line tma-toast-guidance__callout-line--duration" aria-hidden="true"></span>
          <span class="tma-toast-guidance__callout tma-toast-guidance__callout--duration">Toast stays visible for 3 seconds</span>
        </div>
      </section>
    </main>
  </div>

<script>window.TMAGlobalSearchAssetBase = '../images/';</script>
<script src="../js/toast-icons.js"></script>
<script src="../js/global-search.js"></script>
<script src="../js/toast.js"></script>
<script>
const T = window.TMAToast;

document.getElementById('variants-panel').innerHTML = [
  T.renderToast({ size: 'big', state: 'successful', attrs: ' data-node-id="33260:21603"' }),
  T.renderToast({ size: 'big', state: 'failure', attrs: ' data-node-id="33260:21604"' }),
  T.renderToast({ size: 'small', state: 'successful', attrs: ' data-node-id="33260:21605"' }),
  T.renderToast({ size: 'small', state: 'failure', attrs: ' data-node-id="33260:21606"' }),
].join('');

const enterScene = T.mountScene(document.getElementById('scene-enter'), {
  autoShow: true,
  durationMs: 3000,
  loop: false,
});

const durationScene = T.mountScene(document.getElementById('scene-duration'), {
  autoShow: true,
  durationMs: 3000,
  loop: true,
});

document.querySelector('[data-show-enter]').addEventListener('click', () => {
  if (enterScene) enterScene.showToast();
});
</script>
</body>
</html>
