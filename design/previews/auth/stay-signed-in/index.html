<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/" id="tma-site-base">
  <script>(function(){if(!location.hostname.endsWith("github.io"))return;var s=location.pathname.split("/").filter(Boolean)[0];if(!s)return;window.__TMA_SITE_ROOT="/"+s;var b=document.getElementById("tma-site-base");if(b)b.href="/"+s+"/";})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Signed In? - TM ANTOINE Advisory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/auth-flow.css">
  <script>(function(){try{var m=localStorage.getItem("tma.themeMode")||"",t=localStorage.getItem("tma.theme")||"",d=m?m==="dark"||(m==="system"&&matchMedia("(prefers-color-scheme: dark)").matches):t?t==="dark":matchMedia("(prefers-color-scheme: dark)").matches;if(d)document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
  <style>
    html, body { margin: 0; min-height: 100%; }
  </style>
</head>
<body>
  <main class="tma-auth" data-auth-flow
        data-states="default"
        data-state="default"
        data-demo-next="/design/auth/getting-started">
    <button class="tma-auth__theme" type="button" data-action="toggle-theme" aria-label="Toggle dark mode">
      <img src="/images/icons/phosphor/Sun.svg" alt="" width="18" height="18" aria-hidden="true">
    </button>

    <div class="tma-auth__body">
      <section class="tma-auth__card" aria-labelledby="stay-title">
        <div class="tma-auth__icon" aria-hidden="true">
          <img src="/images/icons/phosphor/Devices.svg" alt="" width="80" height="80">
        </div>

        <div class="tma-auth__intro">
          <h1 class="tma-auth__title" id="stay-title">Stay signed in?</h1>
          <p class="tma-auth__subtitle">Skip signing in next time you open the portal on this device.</p>
        </div>

        <div class="tma-auth__section">
          <a class="tma-auth__submit" href="/design/auth/getting-started">Yes, stay signed in</a>
          <a class="tma-auth__submit tma-auth__submit--ghost" href="/design/auth/getting-started">No, sign me out when the session ends</a>
        </div>
      </section>
    </div>

    <p class="tma-auth__copyright">&copy; 2026 TM ANTOINE Advisory</p>
  </main>

  <script src="/js/auth-flow.js"></script>
</body>
</html>
